name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        run: pnpm build

      - name: Package plugin zip
        run: |
          PLUGIN=decky-ollama
          mkdir -p "$PLUGIN"
          cp -r dist main.py plugin.json package.json "$PLUGIN/"
          zip -r "${PLUGIN}.zip" "$PLUGIN"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: decky-ollama.zip
          generate_release_notes: true
